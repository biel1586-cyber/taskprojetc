<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks · Gabriel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBkf_qX8is0TvVZctQGYmbPY7MoYXYHNuU",
    authDomain: "manifest-c6b5c.firebaseapp.com",
    projectId: "manifest-c6b5c",
    storageBucket: "manifest-c6b5c.firebasestorage.app",
    messagingSenderId: "1029545107871",
    appId: "1:1029545107871:web:a57ab29af3507532d01daa"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "tasks", "mytasks");
  window._fbLoad = async () => {
    try { const s = await getDoc(REF); return s.exists() ? s.data().items||[] : []; }
    catch(e) { console.warn(e); return null; }
  };
  window._fbSave = async (items) => {
    try { await setDoc(REF,{items,updatedAt:new Date().toISOString()}); return true; }
    catch(e) { console.warn(e); return false; }
  };
  window._fbReady = true;
  document.dispatchEvent(new Event("fbReady"));
</script>
<style>
:root {
  --bg:         #0D0F14;
  --surface:    #13161E;
  --surface2:   #1A1E2A;
  --surface3:   #222736;
  --border:     #2A2F3F;
  --border2:    #353C52;
  --accent:     #6C8EF5;
  --accent-lt:  #1E2540;
  --accent-glow:rgba(108,142,245,0.18);
  --green:      #3DD68C;
  --green-lt:   #0D2218;
  --amber:      #F5A623;
  --amber-lt:   #251A06;
  --red:        #F5546C;
  --red-lt:     #250A10;
  --purple:     #B57BF7;
  --purple-lt:  #1A0D2A;
  --teal:       #3DD6CC;
  --teal-lt:    #0A1E1E;
  --text:       #E8EAF2;
  --text-muted: #6B7290;
  --text-dim:   #3D4460;
  --radius:     12px;
  --radius-sm:  8px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; }

/* TOPBAR */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
}

.brand-name {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
}

.brand-name span { color: var(--accent); }

.sync-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem;
  color: var(--text-muted);
}

.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
.sync-dot.loading { background:var(--amber); animation:blink .7s infinite; }
.sync-dot.error { background:var(--red); }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.topbar-right { display:flex; gap:8px; align-items:center; }

.btn-add {
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-family: 'Outfit', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  padding: 7px 16px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn-add:hover { background:#5A7AE8; box-shadow:0 0 20px var(--accent-glow); }

/* TABS */
.tabs-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  gap: 4px;
  align-items: center;
}

.tab {
  padding: 10px 18px;
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-sep { flex:1; }

.quick-stats {
  display: flex;
  gap: 16px;
  padding: 8px 0;
}

.qs-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .68rem;
  color: var(--text-muted);
}

.qs-dot { width:6px; height:6px; border-radius:50%; }

/* MAIN */
.main { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* KANBAN */
.kanban-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  align-items: start;
}

.kanban-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.kanban-col-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.col-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.col-dot { width:8px; height:8px; border-radius:50%; }
.col-count { font-family:'JetBrains Mono',monospace; font-size:.7rem; background:var(--surface3); color:var(--text-muted); padding:2px 8px; border-radius:10px; }

.kanban-cards { padding: 10px; display:flex; flex-direction:column; gap:8px; min-height:60px; }

/* TASK CARD */
.task-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  cursor: pointer;
  transition: all .15s;
  animation: cardIn .2s ease;
  border-left: 3px solid transparent;
}

@keyframes cardIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.task-card:hover { border-color:var(--border2); background:var(--surface3); transform:translateY(-1px); box-shadow:var(--shadow); }
.task-card.p-alta   { border-left-color: var(--red); }
.task-card.p-media  { border-left-color: var(--amber); }
.task-card.p-baixa  { border-left-color: var(--green); }
.task-card.done     { opacity: .5; }

.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }

.card-title {
  font-size: .84rem;
  font-weight: 500;
  line-height: 1.35;
  flex: 1;
}

.card-title.done { text-decoration: line-through; color:var(--text-muted); }

.card-check {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem;
}

.task-card.done .card-check { background:var(--green); border-color:var(--green); }

.card-desc {
  font-size: .74rem;
  color: var(--text-muted);
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: .62rem;
  padding: 2px 7px;
  border-radius: 6px;
  white-space: nowrap;
  font-weight: 500;
}

.tag-cat  { background:var(--accent-lt); color:var(--accent); }
.tag-alta { background:var(--red-lt);    color:var(--red); }
.tag-media{ background:var(--amber-lt);  color:var(--amber); }
.tag-baixa{ background:var(--green-lt);  color:var(--green); }

.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: .62rem;
  color: var(--text-muted);
  margin-left: auto;
}

.card-date.overdue { color:var(--red); }
.card-date.today   { color:var(--amber); }

/* LIST VIEW */
.list-section { margin-bottom: 28px; }

.list-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding: 0 2px;
}

.task-list { display:flex; flex-direction:column; gap:6px; }

.task-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid transparent;
  animation: cardIn .2s ease;
}

.task-row:hover { border-color:var(--border2); background:var(--surface2); }
.task-row.p-alta  { border-left-color:var(--red); }
.task-row.p-media { border-left-color:var(--amber); }
.task-row.p-baixa { border-left-color:var(--green); }
.task-row.done    { opacity:.5; }

.row-check {
  width:18px; height:18px;
  border:1.5px solid var(--border2);
  border-radius:5px;
  flex-shrink:0;
  cursor:pointer;
  transition:all .15s;
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem;
}

.task-row.done .row-check { background:var(--green); border-color:var(--green); }

.row-title { font-size:.86rem; font-weight:500; flex:1; }
.row-title.done { text-decoration:line-through; color:var(--text-muted); }
.row-desc  { font-size:.74rem; color:var(--text-muted); flex:1.5; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-meta  { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.row-date  { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--text-muted); }
.row-date.overdue { color:var(--red); }
.row-date.today   { color:var(--amber); }

.row-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
.task-row:hover .row-actions { opacity:1; }

.mini-btn {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-muted);
  font-size: .68rem;
  padding: 3px 7px;
  cursor: pointer;
  transition: all .15s;
}

.mini-btn:hover { background:var(--border); color:var(--text); }
.mini-btn.del:hover { background:var(--red-lt); border-color:var(--red); color:var(--red); }

/* DATE NAVIGATOR */
.date-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: .8rem;
  padding: 6px 12px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Outfit', sans-serif;
}

.nav-btn:hover { background:var(--surface3); color:var(--text); border-color:var(--border2); }

.nav-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: .82rem;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  text-align: center;
}

.nav-today {
  background: var(--accent-lt);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-size: .75rem;
  font-weight: 600;
  padding: 5px 12px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all .15s;
}

.nav-today:hover { background:var(--accent); color:white; }

/* WEEK GRID */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}

.week-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 120px;
}

.week-day.is-today { border-color: var(--accent); }

.week-day-header {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.week-day-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: .6rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.week-day-num {
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.week-day.is-today .week-day-num { color: var(--accent); }

.week-day-tasks { padding: 6px; display:flex; flex-direction:column; gap:4px; }

.week-task-chip {
  font-size: .68rem;
  padding: 4px 8px;
  border-radius: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all .1s;
}

.week-task-chip:hover { background:var(--surface3); }
.week-task-chip.p-alta  { border-left-color:var(--red); }
.week-task-chip.p-media { border-left-color:var(--amber); }
.week-task-chip.p-baixa { border-left-color:var(--green); }
.week-task-chip.done    { opacity:.45; text-decoration:line-through; }

.week-more { font-size:.62rem; color:var(--accent); font-family:'JetBrains Mono',monospace; padding:2px 8px; cursor:pointer; }

/* MONTH GRID */
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.month-day-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: .62rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: center;
  padding: 6px 0;
}

.month-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  min-height: 90px;
  padding: 6px;
  cursor: default;
  transition: border-color .15s;
}

.month-day.is-today { border-color:var(--accent); }
.month-day.other-month { opacity:.35; }

.month-day-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 500;
}

.month-day.is-today .month-day-num { color:var(--accent); }

.month-task-dot {
  font-size: .65rem;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface2);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .1s;
}

.month-task-dot:hover { background:var(--surface3); }
.month-task-dot.p-alta  { border-left-color:var(--red); }
.month-task-dot.p-media { border-left-color:var(--amber); }
.month-task-dot.p-baixa { border-left-color:var(--green); }
.month-task-dot.done    { opacity:.4; }

.month-more { font-size:.6rem; color:var(--accent); font-family:'JetBrains Mono',monospace; cursor:pointer; }

/* EMPTY */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

.empty .empty-icon { font-size: 2rem; margin-bottom: 10px; display:block; }
.empty strong { display:block; font-size:.95rem; color:var(--text-dim); margin-bottom:6px; }

/* MODAL */
.modal-bg {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  z-index:200;
  align-items:center;
  justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
}
.modal-bg.open { display:flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 28px;
  width: 100%;
  max-width: 500px;
  animation: popIn .2s ease;
  max-height: 90vh;
  overflow-y: auto;
}

@keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}

.modal-hdr {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:22px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}

.modal-icon {
  width:36px; height:36px;
  background:var(--accent-lt);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem;
}

.modal-hdr h2 {
  font-size:1.05rem;
  font-weight:700;
  letter-spacing:-.02em;
}

.fg { margin-bottom:14px; }

.fl {
  display:block;
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:6px;
}

.fi,.fs,.fta {
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  padding:9px 12px;
  font-size:.84rem;
  font-family:'Outfit',sans-serif;
  outline:none;
  transition:border-color .15s,background .15s;
}

.fi:focus,.fs:focus,.fta:focus { border-color:var(--accent); background:var(--surface3); }
.fs option { background:var(--surface2); }
.fta { resize:vertical; min-height:80px; }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.modal-ftr {
  display:flex;
  gap:8px;
  justify-content:flex-end;
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid var(--border);
}

.btn-cancel {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-muted);
  padding:9px 18px;
  font-family:'Outfit',sans-serif;
  font-size:.82rem;
  cursor:pointer;
  transition:all .15s;
}

.btn-cancel:hover { background:var(--surface3); color:var(--text); }

.btn-save {
  background:var(--accent);
  border:none;
  border-radius:var(--radius-sm);
  color:white;
  padding:9px 22px;
  font-family:'Outfit',sans-serif;
  font-weight:600;
  font-size:.82rem;
  cursor:pointer;
  transition:all .15s;
}

.btn-save:hover { background:#5A7AE8; box-shadow:0 0 16px var(--accent-glow); }

/* TOAST */
.toast {
  position:fixed;
  bottom:24px; right:24px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 18px;
  border-radius:var(--radius-sm);
  font-size:.78rem;
  font-weight:500;
  box-shadow:var(--shadow);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
  z-index:999;
}
.toast.show { opacity:1; }

/* FILTERS ROW */
.filters-row {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
  align-items:center;
}

.f-chip {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  color:var(--text-muted);
  font-size:.74rem;
  padding:5px 14px;
  cursor:pointer;
  font-family:'Outfit',sans-serif;
  transition:all .15s;
}

.f-chip:hover,.f-chip.active { border-color:var(--accent); color:var(--accent); background:var(--accent-lt); }

.f-sel {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-muted);
  font-family:'Outfit',sans-serif;
  font-size:.74rem;
  padding:6px 10px;
  outline:none;
  cursor:pointer;
  transition:border-color .15s;
}

.f-sel:focus { border-color:var(--accent); }
.f-sel option { background:var(--surface2); }

.f-search {
  margin-left:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:.76rem;
  padding:6px 12px;
  outline:none;
  width:200px;
  transition:border-color .15s;
}

.f-search:focus { border-color:var(--accent); }
.f-search::placeholder { color:var(--text-muted); }

/* RESPONSIVE */
@media(max-width:900px){
  .kanban-board{grid-template-columns:repeat(2,1fr);}
  .week-grid{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:600px){
  .kanban-board{grid-template-columns:1fr;}
  .week-grid{grid-template-columns:repeat(2,1fr);}
  .month-grid{grid-template-columns:repeat(7,1fr);}
  .main{padding:16px;}
  .topbar{padding:0 16px;}
  .tabs-bar{padding:0 16px;overflow-x:auto;}
  .frow{grid-template-columns:1fr;}
  .quick-stats{display:none;}
  .f-search{width:140px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">✓</div>
    <span class="brand-name">my<span>tasks</span></span>
  </div>
  <div class="sync-pill">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncMsg">conectando...</span>
  </div>
  <div class="topbar-right">
    <button class="btn-add" onclick="abrirModal()">+ Nova Tarefa</button>
  </div>
</div>

<div class="tabs-bar">
  <div class="tab active" onclick="setTab(this,'kanban')">⬜ Kanban</div>
  <div class="tab" onclick="setTab(this,'dia')">📅 Dia</div>
  <div class="tab" onclick="setTab(this,'semana')">🗓 Semana</div>
  <div class="tab" onclick="setTab(this,'mes')">📆 Mês</div>
  <div class="tab" onclick="setTab(this,'todas')">☰ Todas</div>
  <div class="tab-sep"></div>
  <div class="quick-stats" id="quickStats"></div>
</div>

<div class="main">

  <!-- KANBAN -->
  <div class="view active" id="view-kanban">
    <div class="filters-row">
      <button class="f-chip active" onclick="setKanbanFiltro(this,'todas')">Todas</button>
      <button class="f-chip" onclick="setKanbanFiltro(this,'hoje')">Hoje</button>
      <button class="f-chip" onclick="setKanbanFiltro(this,'semana')">Esta semana</button>
      <select class="f-sel" id="kb-cat" onchange="renderKanban()"><option value="">Todas as categorias</option></select>
      <input class="f-search" type="text" id="kb-search" placeholder="🔍 Buscar..." oninput="renderKanban()">
    </div>
    <div class="kanban-board">
      <div class="kanban-col">
        <div class="kanban-col-header"><div class="col-title"><span class="col-dot" style="background:var(--text-muted)"></span>A Fazer</div><span class="col-count" id="cnt-afazer">0</span></div>
        <div class="kanban-cards" id="kb-afazer"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header"><div class="col-title"><span class="col-dot" style="background:var(--accent)"></span>Em Progresso</div><span class="col-count" id="cnt-prog">0</span></div>
        <div class="kanban-cards" id="kb-prog"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header"><div class="col-title"><span class="col-dot" style="background:var(--amber)"></span>Revisão</div><span class="col-count" id="cnt-rev">0</span></div>
        <div class="kanban-cards" id="kb-rev"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-header"><div class="col-title"><span class="col-dot" style="background:var(--green)"></span>Concluído</div><span class="col-count" id="cnt-done">0</span></div>
        <div class="kanban-cards" id="kb-done"></div>
      </div>
    </div>
  </div>

  <!-- DIA -->
  <div class="view" id="view-dia">
    <div class="date-nav">
      <button class="nav-btn" onclick="navDia(-1)">← Anterior</button>
      <span class="nav-title" id="nav-dia-title"></span>
      <button class="nav-btn" onclick="navDia(1)">Próximo →</button>
      <button class="nav-today" onclick="irHoje('dia')">Hoje</button>
    </div>
    <div id="lista-dia"></div>
  </div>

  <!-- SEMANA -->
  <div class="view" id="view-semana">
    <div class="date-nav">
      <button class="nav-btn" onclick="navSemana(-1)">← Anterior</button>
      <span class="nav-title" id="nav-sem-title"></span>
      <button class="nav-btn" onclick="navSemana(1)">Próxima →</button>
      <button class="nav-today" onclick="irHoje('semana')">Esta semana</button>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- MÊS -->
  <div class="view" id="view-mes">
    <div class="date-nav">
      <button class="nav-btn" onclick="navMes(-1)">← Anterior</button>
      <span class="nav-title" id="nav-mes-title"></span>
      <button class="nav-btn" onclick="navMes(1)">Próximo →</button>
      <button class="nav-today" onclick="irHoje('mes')">Este mês</button>
    </div>
    <div class="month-grid" id="month-grid"></div>
  </div>

  <!-- TODAS -->
  <div class="view" id="view-todas">
    <div class="filters-row">
      <button class="f-chip active" onclick="setTodasFiltro(this,'todas')">Todas</button>
      <button class="f-chip" onclick="setTodasFiltro(this,'pendente')">Pendentes</button>
      <button class="f-chip" onclick="setTodasFiltro(this,'concluido')">Concluídas</button>
      <button class="f-chip" onclick="setTodasFiltro(this,'atrasada')">Atrasadas</button>
      <select class="f-sel" id="all-cat" onchange="renderTodas()"><option value="">Todas as categorias</option></select>
      <select class="f-sel" id="all-prio" onchange="renderTodas()"><option value="">Todas as prioridades</option><option value="Alta">Alta</option><option value="Média">Média</option><option value="Baixa">Baixa</option></select>
      <input class="f-search" type="text" id="all-search" placeholder="🔍 Buscar..." oninput="renderTodas()">
    </div>
    <div id="lista-todas"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-icon">✏️</div><h2 id="modalTit">Nova Tarefa</h2></div>
    <div class="fg"><label class="fl">Título *</label><input class="fi" id="fTitulo" placeholder="Do que se trata?"></div>
    <div class="fg"><label class="fl">Descrição / Observação</label><textarea class="fta" id="fDesc" placeholder="Detalhes, contexto, links..."></textarea></div>
    <div class="frow">
      <div class="fg"><label class="fl">Status</label>
        <select class="fs" id="fStatus">
          <option value="afazer">A Fazer</option>
          <option value="prog">Em Progresso</option>
          <option value="rev">Revisão</option>
          <option value="concluido">Concluído</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Prioridade</label>
        <select class="fs" id="fPrio">
          <option value="Alta">🔴 Alta</option>
          <option value="Média" selected>🟡 Média</option>
          <option value="Baixa">🟢 Baixa</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Categoria</label><input class="fi" id="fCat" list="dl-cats" placeholder="Ex: Trabalho, Pessoal..."><datalist id="dl-cats"></datalist></div>
      <div class="fg"><label class="fl">Data</label><input class="fi" id="fData" type="date"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
let tasks = [];
let editId = null;
let toastTimer = null;
let curDia, curSemana, curMes;
let kanbanFiltro = 'todas';
let todasFiltro  = 'todas';

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function hoje(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d) return ''; const[y,m,dia]=d.split('-'); return `${dia}/${m}/${y}`; }
function parseD(s){ if(!s) return null; return new Date(s+'T00:00:00'); }

function dateClass(d){
  if(!d) return '';
  const t=parseD(d), h=parseD(hoje());
  if(t<h) return 'overdue';
  if(t.toDateString()===h.toDateString()) return 'today';
  return '';
}

function dateLabel(d){
  if(!d) return '';
  const t=parseD(d), h=parseD(hoje());
  const diff=Math.round((t-h)/(1000*60*60*24));
  if(diff<0) return `⚠ ${Math.abs(diff)}d atrás`;
  if(diff===0) return '📌 Hoje';
  if(diff===1) return '↗ Amanhã';
  return fmt(d);
}

// FIREBASE
function setSyncStatus(s,msg){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncMsg');
  dot.className='sync-dot'+(s==='loading'?' loading':s==='error'?' error':'');
  lbl.textContent=msg;
}
async function waitFb(){ if(window._fbReady) return true; return new Promise(r=>document.addEventListener('fbReady',()=>r(true),{once:true})); }

async function load(){
  setSyncStatus('loading','carregando...');
  await waitFb();
  const data=await window._fbLoad();
  if(data===null){ setSyncStatus('error','local'); try{tasks=JSON.parse(localStorage.getItem('mytasks-v1')||'[]');}catch(_){} }
  else{ tasks=data; setSyncStatus('ok','firebase ✓'); }
  if(!tasks.length) seed();
  initDates(); renderAll(); popularCats();
}

async function save(){
  setSyncStatus('loading','salvando...');
  localStorage.setItem('mytasks-v1',JSON.stringify(tasks));
  await waitFb();
  const ok=await window._fbSave(tasks);
  setSyncStatus(ok?'ok':'error',ok?'firebase ✓':'local');
  toast(ok?'✓ Salvo na nuvem':'⚠ Salvo localmente');
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }

function seed(){
  const h=hoje(), d=new Date(); d.setDate(d.getDate()+1); const am=d.toISOString().split('T')[0];
  d.setDate(d.getDate()+1); const dep=d.toISOString().split('T')[0];
  tasks=[
    {id:uid(),titulo:'Revisar relatório semanal',desc:'Verificar KPIs e consolidar os dados da semana.',status:'prog',prioridade:'Alta',categoria:'Trabalho',data:h},
    {id:uid(),titulo:'Reunião de alinhamento com o time',desc:'Pauta: andamento da implantação e próximos passos.',status:'afazer',prioridade:'Alta',categoria:'Trabalho',data:h},
    {id:uid(),titulo:'Atualizar diário de implantação',desc:'Registrar pendências concluídas e novas.',status:'afazer',prioridade:'Média',categoria:'Trabalho',data:am},
    {id:uid(),titulo:'Estudar Firebase Firestore',desc:'Ler documentação de regras de segurança.',status:'rev',prioridade:'Baixa',categoria:'Estudo',data:am},
    {id:uid(),titulo:'Comprar mantimentos',desc:'',status:'afazer',prioridade:'Baixa',categoria:'Pessoal',data:dep},
    {id:uid(),titulo:'Configurar dashboard DCPS',desc:'Testar importação de dados reais.',status:'concluido',prioridade:'Alta',categoria:'Trabalho',data:h},
  ];
}

function initDates(){
  const n=new Date();
  curDia=new Date(n); curDia.setHours(0,0,0,0);
  curSemana=new Date(n); curSemana.setHours(0,0,0,0);
  const dw=curSemana.getDay(); curSemana.setDate(curSemana.getDate()-(dw===0?6:dw-1));
  curMes=new Date(n.getFullYear(),n.getMonth(),1);
}

function renderAll(){
  renderQuickStats(); renderKanban(); renderDia(); renderSemana(); renderMes(); renderTodas();
}

function renderQuickStats(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='concluido').length;
  const hoje2=hoje();
  const hj=tasks.filter(t=>t.data===hoje2&&t.status!=='concluido').length;
  const atras=tasks.filter(t=>t.data&&t.data<hoje2&&t.status!=='concluido').length;
  document.getElementById('quickStats').innerHTML=`
    <span class="qs-item"><span class="qs-dot" style="background:var(--text-muted)"></span>${total} total</span>
    <span class="qs-item"><span class="qs-dot" style="background:var(--amber)"></span>${hj} hoje</span>
    <span class="qs-item"><span class="qs-dot" style="background:var(--green)"></span>${done} concluídas</span>
    ${atras>0?`<span class="qs-item"><span class="qs-dot" style="background:var(--red)"></span>${atras} atrasadas</span>`:''}
  `;
}

function popularCats(){
  const cats=[...new Set(tasks.map(t=>t.categoria).filter(Boolean))].sort();
  ['kb-cat','all-cat','dl-cats'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    const isSelect=el.tagName==='SELECT';
    const cur=el.value||'';
    if(isSelect){ el.innerHTML='<option value="">Todas as categorias</option>'; cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;el.appendChild(o);}); el.value=cur; }
    else{ el.innerHTML=''; cats.forEach(c=>{const o=document.createElement('option');o.value=c;el.appendChild(o);}); }
  });
}

// ── KANBAN ──────────────────────────────────────────────────
function setKanbanFiltro(btn,f){ document.querySelectorAll('#view-kanban .f-chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); kanbanFiltro=f; renderKanban(); }

function filtrarKanban(lista){
  const h=hoje(); const d=new Date(); d.setDate(d.getDate()+7); const fw=d.toISOString().split('T')[0];
  const cat=document.getElementById('kb-cat').value;
  const busca=document.getElementById('kb-search').value.toLowerCase();
  return lista.filter(t=>{
    if(kanbanFiltro==='hoje'&&t.data!==h) return false;
    if(kanbanFiltro==='semana'&&(t.data<h||t.data>fw)) return false;
    if(cat&&t.categoria!==cat) return false;
    if(busca&&!t.titulo.toLowerCase().includes(busca)&&!(t.desc||'').toLowerCase().includes(busca)) return false;
    return true;
  });
}

function renderKanban(){
  const cols={afazer:'kb-afazer',prog:'kb-prog',rev:'kb-rev',concluido:'kb-done'};
  const cnts={afazer:'cnt-afazer',prog:'cnt-prog',rev:'cnt-rev',concluido:'cnt-done'};
  const lista=filtrarKanban(tasks);
  Object.entries(cols).forEach(([status,elId])=>{
    const group=lista.filter(t=>t.status===status);
    document.getElementById(cnts[status]).textContent=group.length;
    const el=document.getElementById(elId);
    if(!group.length){ el.innerHTML=''; return; }
    el.innerHTML=group.map(t=>taskCardHTML(t)).join('');
  });
}

function taskCardHTML(t){
  const dc=dateClass(t.data); const dl=dateLabel(t.data);
  return`<div class="task-card p-${t.prioridade?.toLowerCase().replace('é','e').replace('í','i')} ${t.status==='concluido'?'done':''}" onclick="editarTask('${t.id}')">
    <div class="card-top">
      <div class="card-title ${t.status==='concluido'?'done':''}">${t.titulo}</div>
      <div class="card-check" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.status==='concluido'?'✓':''}</div>
    </div>
    ${t.desc?`<div class="card-desc">${t.desc}</div>`:''}
    <div class="card-footer">
      ${t.categoria?`<span class="tag tag-cat">${t.categoria}</span>`:''}
      <span class="tag tag-${t.prioridade?.toLowerCase().replace('é','e').replace('í','i')}">${t.prioridade||''}</span>
      ${t.data?`<span class="card-date ${dc}">${dl}</span>`:''}
    </div>
  </div>`;
}

// ── DIA ──────────────────────────────────────────────────────
function navDia(n){ curDia.setDate(curDia.getDate()+n); renderDia(); }
function irHoje(v){ const h=new Date(); h.setHours(0,0,0,0); if(v==='dia') curDia=new Date(h); else if(v==='semana'){curSemana=new Date(h);const dw=curSemana.getDay();curSemana.setDate(curSemana.getDate()-(dw===0?6:dw-1));} else if(v==='mes') curMes=new Date(h.getFullYear(),h.getMonth(),1); renderDia(); renderSemana(); renderMes(); }

function renderDia(){
  const iso=curDia.toISOString().split('T')[0];
  const isHoje=iso===hoje();
  document.getElementById('nav-dia-title').textContent=curDia.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const lista=tasks.filter(t=>t.data===iso);
  const el=document.getElementById('lista-dia');
  if(!lista.length){ el.innerHTML=`<div class="empty"><span class="empty-icon">📭</span><strong>${isHoje?'Nenhuma tarefa para hoje':'Nenhuma tarefa neste dia'}</strong><span>Clique em "+ Nova Tarefa" para adicionar.</span></div>`; return; }
  el.innerHTML=`<div class="task-list">${lista.map(t=>taskRowHTML(t)).join('')}</div>`;
}

function taskRowHTML(t){
  const dc=dateClass(t.data);
  const pSlug=t.prioridade?.toLowerCase().replace('é','e').replace('í','i');
  return`<div class="task-row p-${pSlug} ${t.status==='concluido'?'done':''}" onclick="editarTask('${t.id}')">
    <div class="row-check" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.status==='concluido'?'✓':''}</div>
    <div class="row-title ${t.status==='concluido'?'done':''}">${t.titulo}</div>
    ${t.desc?`<div class="row-desc">${t.desc}</div>`:'<div style="flex:1.5"></div>'}
    <div class="row-meta">
      ${t.categoria?`<span class="tag tag-cat">${t.categoria}</span>`:''}
      <span class="tag tag-${pSlug}">${t.prioridade||''}</span>
      ${t.data?`<span class="row-date ${dc}">${dateLabel(t.data)}</span>`:''}
    </div>
    <div class="row-actions">
      <button class="mini-btn" onclick="event.stopPropagation();editarTask('${t.id}')">✏</button>
      <button class="mini-btn del" onclick="event.stopPropagation();deletar('${t.id}')">✕</button>
    </div>
  </div>`;
}

// ── SEMANA ───────────────────────────────────────────────────
function navSemana(n){ curSemana.setDate(curSemana.getDate()+n*7); renderSemana(); }

function renderSemana(){
  const dias=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const start=new Date(curSemana);
  const end=new Date(start); end.setDate(end.getDate()+6);
  document.getElementById('nav-sem-title').textContent=`${start.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} — ${end.toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}`;
  const h=hoje();
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const iso=d.toISOString().split('T')[0];
    const isH=iso===h;
    const dTasks=tasks.filter(t=>t.data===iso);
    const vis=dTasks.slice(0,3);
    html+=`<div class="week-day ${isH?'is-today':''}">
      <div class="week-day-header">
        <span class="week-day-name">${dias[i]}</span>
        <span class="week-day-num">${d.getDate()}</span>
      </div>
      <div class="week-day-tasks">
        ${vis.map(t=>`<div class="week-task-chip p-${t.prioridade?.toLowerCase().replace('é','e').replace('í','i')} ${t.status==='concluido'?'done':''}" onclick="editarTask('${t.id}')">${t.titulo}</div>`).join('')}
        ${dTasks.length>3?`<span class="week-more">+${dTasks.length-3} mais</span>`:''}
      </div>
    </div>`;
  }
  document.getElementById('week-grid').innerHTML=html;
}

// ── MÊS ──────────────────────────────────────────────────────
function navMes(n){ curMes=new Date(curMes.getFullYear(),curMes.getMonth()+n,1); renderMes(); }

function renderMes(){
  document.getElementById('nav-mes-title').textContent=curMes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const dias=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  let html=dias.map(d=>`<div class="month-day-name">${d}</div>`).join('');
  const h=hoje();
  const firstDay=new Date(curMes.getFullYear(),curMes.getMonth(),1);
  const lastDay=new Date(curMes.getFullYear(),curMes.getMonth()+1,0);
  let start=firstDay.getDay(); start=start===0?6:start-1;
  const prev=new Date(curMes.getFullYear(),curMes.getMonth(),0);
  for(let i=start-1;i>=0;i--){
    const d=new Date(prev); d.setDate(prev.getDate()-i);
    html+=`<div class="month-day other-month"><div class="month-day-num">${d.getDate()}</div></div>`;
  }
  for(let i=1;i<=lastDay.getDate();i++){
    const d=new Date(curMes.getFullYear(),curMes.getMonth(),i);
    const iso=d.toISOString().split('T')[0];
    const isH=iso===h;
    const dTasks=tasks.filter(t=>t.data===iso);
    const vis=dTasks.slice(0,3);
    html+=`<div class="month-day ${isH?'is-today':''}">
      <div class="month-day-num">${i}</div>
      ${vis.map(t=>`<div class="month-task-dot p-${t.prioridade?.toLowerCase().replace('é','e').replace('í','i')} ${t.status==='concluido'?'done':''}" onclick="editarTask('${t.id}')">${t.titulo}</div>`).join('')}
      ${dTasks.length>3?`<div class="month-more">+${dTasks.length-3}</div>`:''}
    </div>`;
  }
  const remaining=(7-((start+lastDay.getDate())%7))%7;
  for(let i=1;i<=remaining;i++) html+=`<div class="month-day other-month"><div class="month-day-num">${i}</div></div>`;
  document.getElementById('month-grid').innerHTML=html;
}

// ── TODAS ────────────────────────────────────────────────────
function setTodasFiltro(btn,f){ document.querySelectorAll('#view-todas .f-chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); todasFiltro=f; renderTodas(); }

function renderTodas(){
  const h=hoje();
  const cat=document.getElementById('all-cat').value;
  const prio=document.getElementById('all-prio').value;
  const busca=document.getElementById('all-search').value.toLowerCase();
  let lista=[...tasks];
  if(todasFiltro==='pendente') lista=lista.filter(t=>t.status!=='concluido');
  if(todasFiltro==='concluido') lista=lista.filter(t=>t.status==='concluido');
  if(todasFiltro==='atrasada') lista=lista.filter(t=>t.data&&t.data<h&&t.status!=='concluido');
  if(cat) lista=lista.filter(t=>t.categoria===cat);
  if(prio) lista=lista.filter(t=>t.prioridade===prio);
  if(busca) lista=lista.filter(t=>t.titulo.toLowerCase().includes(busca)||(t.desc||'').toLowerCase().includes(busca));
  lista.sort((a,b)=>{
    const ord={afazer:0,prog:1,rev:2,concluido:3};
    if(ord[a.status]!==ord[b.status]) return ord[a.status]-ord[b.status];
    const pa={Alta:0,Média:1,Baixa:2}; return (pa[a.prioridade]||1)-(pa[b.prioridade]||1);
  });
  const el=document.getElementById('lista-todas');
  if(!lista.length){ el.innerHTML='<div class="empty"><span class="empty-icon">🔍</span><strong>Nenhuma tarefa encontrada</strong></div>'; return; }
  // Agrupar por status
  const grupos={afazer:'A Fazer',prog:'Em Progresso',rev:'Revisão',concluido:'Concluído'};
  let html='';
  Object.entries(grupos).forEach(([status,label])=>{
    const g=lista.filter(t=>t.status===status);
    if(!g.length) return;
    html+=`<div class="list-section"><div class="list-section-title">${label} · ${g.length}</div><div class="task-list">${g.map(t=>taskRowHTML(t)).join('')}</div></div>`;
  });
  el.innerHTML=html;
}

// ── MODAL ────────────────────────────────────────────────────
function abrirModal(id=null, preData=null){
  editId=id; const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('modalTit').textContent=id?'Editar Tarefa':'Nova Tarefa';
  document.getElementById('fTitulo').value=t?.titulo||'';
  document.getElementById('fDesc').value=t?.desc||'';
  document.getElementById('fStatus').value=t?.status||'afazer';
  document.getElementById('fPrio').value=t?.prioridade||'Média';
  document.getElementById('fCat').value=t?.categoria||'';
  document.getElementById('fData').value=t?.data||preData||hoje();
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fTitulo').focus(),80);
}

function fecharModal(){ document.getElementById('modalBg').classList.remove('open'); editId=null; }
function editarTask(id){ abrirModal(id); }

function salvar(){
  const titulo=document.getElementById('fTitulo').value.trim();
  if(!titulo){ document.getElementById('fTitulo').style.borderColor='var(--red)'; return; }
  document.getElementById('fTitulo').style.borderColor='';
  const dado={titulo,desc:document.getElementById('fDesc').value.trim(),status:document.getElementById('fStatus').value,prioridade:document.getElementById('fPrio').value,categoria:document.getElementById('fCat').value.trim(),data:document.getElementById('fData').value};
  if(editId){ const idx=tasks.findIndex(t=>t.id===editId); tasks[idx]={...tasks[idx],...dado}; }
  else tasks.unshift({id:uid(),...dado});
  save(); fecharModal(); popularCats(); renderAll();
}

function deletar(id){ if(!confirm('Excluir esta tarefa?')) return; tasks=tasks.filter(t=>t.id!==id); save(); renderAll(); }

function toggleDone(id){
  const idx=tasks.findIndex(t=>t.id===id);
  tasks[idx].status=tasks[idx].status==='concluido'?'afazer':'concluido';
  save(); renderAll();
}

// ── TABS ────────────────────────────────────────────────────
function setTab(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
}

// ── KEYBOARD ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{ if(e.key==='Escape') fecharModal(); });
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===document.getElementById('modalBg')) fecharModal(); });

load();
</script>
